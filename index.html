<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAFEN // COLLISION FIELD</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family: Arial, sans-serif;
overflow:hidden;
}

#field{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

.word{
position:absolute;
font-size:14px;
opacity:0.9;
white-space:nowrap;
mix-blend-mode: difference;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
letter-spacing:12px;
font-weight:900;
}

.sub{
position:absolute;
top:58%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.5;
}

</style>
</head>

<body>

<div class="center">HAFEN</div>
<div class="sub">REBORN COLLISION FIELD</div>

<div id="field"></div>

<script>

const phrases = [
"SEPULTURA // MOTORHEAD // VAN HALEN",
"GEORGE MICHAEL IN THE STATIC",
"DEPECHE MODE INSIDE SILENCE",
"JAMES BROWN KEEPS THE BODY ALIVE",
"SCORPIONS // BON JOVI // DOOBIE BROTHERS",
"HOPE IS NOT CALM",
"HOPE IS NOISE",
"WE DON’T ORGANIZE SOUND",
"WE SURVIVE INSIDE IT",
"THIS IS NOT A BRAND",
"THIS IS WHAT REMAINS"
];

const field = document.getElementById("field");

function spawn(){
const el = document.createElement("div");
el.className = "word";
el.innerText = phrases[Math.floor(Math.random()*phrases.length)];

el.style.left = Math.random()*100 + "vw";
el.style.top = Math.random()*100 + "vh";
el.style.fontSize = (10 + Math.random()*20) + "px";

field.appendChild(el);

// some die, some stay
setTimeout(()=> {
el.remove();
}, 4000 + Math.random()*4000);
}

setInterval(spawn, 200);

// micro shake of reality
setInterval(()=>{
document.body.style.transform =
`translate(${(Math.random()-0.5)*2}px, ${(Math.random()-0.5)*2}px)`;
}, 80);

</script>

</body>
</html>
